<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Universal</title>
    <link rel="stylesheet" href="style.css">
    <!-- SheetJS para manipulação de XLSX -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <!-- PapaParse para CSV rápido -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- x2js para XML <-> JSON -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/x2js/1.2.0/xml2json.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Conversor de Arquivos</h1>
        <p class="subtitle">Converta facilmente entre CSV, JSON, XML e XLSX</p>

        <div class="upload-area" id="drop-zone">
            <input type="file" id="file-input" accept=".csv,.json,.xml,.xlsx">
            <label for="file-input" class="upload-label">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <span id="file-name">Clique para escolher ou arraste um arquivo</span>
            </label>
        </div>

        <div class="options">
            <label for="output-format">Formato de Saída:</label>
            <select id="output-format" disabled>
                <option value="">Selecione o arquivo primeiro</option>
            </select>
        </div>

        <button id="convert-btn" class="btn" disabled>Converter e Baixar</button>
        <div id="status-message" class="status"></div>

        <div id="preview-container" class="preview-section" style="display: none;">
            <h3>Prévia dos Dados</h3>
            <div class="table-wrapper">
                <table id="preview-table"></table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
